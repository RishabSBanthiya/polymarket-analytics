{% extends "base.html" %}

{% block title %}Trade History - Polymarket Analytics{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">Trade History</h1>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <form class="row g-3" id="filter-form">
                    <div class="col-md-3">
                        <label class="form-label">Agent ID</label>
                        <input type="text" class="form-control" id="agent-filter" placeholder="All agents">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Start Date</label>
                        <input type="datetime-local" class="form-control" id="start-date">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">End Date</label>
                        <input type="datetime-local" class="form-control" id="end-date">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">&nbsp;</label>
                        <button type="submit" class="btn btn-primary w-100">Filter</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h5>Trades</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Agent</th>
                                <th>Market</th>
                                <th>Side</th>
                                <th>Shares</th>
                                <th>Price</th>
                                <th>Filled Price</th>
                                <th>Signal Score</th>
                                <th>Status</th>
                                <th>Type</th>
                            </tr>
                        </thead>
                        <tbody id="trades-table">
                            <tr><td colspan="9" class="text-center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
async function loadTrades() {
    try {
        const params = new URLSearchParams();
        const agentId = document.getElementById('agent-filter').value;
        const startDate = document.getElementById('start-date').value;
        const endDate = document.getElementById('end-date').value;
        
        if (agentId) params.append('agent_id', agentId);
        if (startDate) params.append('start_time', new Date(startDate).toISOString());
        if (endDate) params.append('end_time', new Date(endDate).toISOString());
        params.append('include_orphans', 'true');  // Always include orphans in trade history page
        
        const res = await fetch(`/api/trades/?${params.toString()}`);
        const trades = await res.json();
        
        const html = trades.length > 0 ? trades.map(t => {
            const side = t.side || 'UNKNOWN';
            const sideClass = side === 'BUY' ? 'bg-success' : side === 'SELL' ? 'bg-danger' : side === 'DEPOSIT' ? 'bg-info' : side === 'WITHDRAWAL' ? 'bg-warning text-dark' : 'bg-secondary';
            const txType = t.transaction_type || 'trade';
            const isSpecialTx = txType !== 'trade';
            
            return `
            <tr ${t.is_orphan ? 'class="table-warning"' : ''}>
                <td>${new Date(t.timestamp).toLocaleString()}</td>
                <td>${t.agent_id}</td>
                <td><small>${t.market_id ? t.market_id.substring(0, 20) + '...' : '-'}</small></td>
                <td><span class="badge ${sideClass}">${side}</span></td>
                <td>${isSpecialTx ? '-' : t.shares.toFixed(4)}</td>
                <td>${isSpecialTx ? '-' : '$' + t.price.toFixed(4)}</td>
                <td>${isSpecialTx ? '$' + t.filled_price.toFixed(2) : '$' + t.filled_price.toFixed(4)}</td>
                <td>${t.signal_score ? t.signal_score.toFixed(1) : '-'}</td>
                <td><span class="badge ${t.success ? 'bg-success' : 'bg-danger'}">${t.success ? 'Success' : 'Failed'}</span></td>
                <td>${t.is_orphan ? '<span class="badge bg-warning text-dark">Orphan</span>' : '<span class="badge bg-info">Tracked</span>'}</td>
            </tr>
        `;
        }).join('') : '<tr><td colspan="10" class="text-center">No trades found</td></tr>';
        
        document.getElementById('trades-table').innerHTML = html;
    } catch (error) {
        console.error('Error loading trades:', error);
    }
}

document.getElementById('filter-form').addEventListener('submit', (e) => {
    e.preventDefault();
    loadTrades();
});

loadTrades();
</script>
{% endblock %}
