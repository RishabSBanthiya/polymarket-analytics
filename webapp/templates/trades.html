{% extends "base.html" %}

{% block title %}Trade History - Polymarket Analytics{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">Trade History</h1>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <form class="row g-3" id="filter-form">
                    <div class="col-md-3">
                        <label class="form-label">Agent ID</label>
                        <input type="text" class="form-control" id="agent-filter" placeholder="All agents">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Start Date</label>
                        <input type="datetime-local" class="form-control" id="start-date">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">End Date</label>
                        <input type="datetime-local" class="form-control" id="end-date">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">&nbsp;</label>
                        <button type="submit" class="btn btn-primary w-100">Filter</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h5>Trades</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Agent</th>
                                <th>Market</th>
                                <th>Side</th>
                                <th>Shares</th>
                                <th>Price</th>
                                <th>Filled Price</th>
                                <th>Signal Score</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="trades-table">
                            <tr><td colspan="9" class="text-center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
async function loadTrades() {
    try {
        const params = new URLSearchParams();
        const agentId = document.getElementById('agent-filter').value;
        const startDate = document.getElementById('start-date').value;
        const endDate = document.getElementById('end-date').value;
        
        if (agentId) params.append('agent_id', agentId);
        if (startDate) params.append('start_time', new Date(startDate).toISOString());
        if (endDate) params.append('end_time', new Date(endDate).toISOString());
        
        const res = await fetch(`/api/trades/?${params.toString()}`);
        const trades = await res.json();
        
        const html = trades.length > 0 ? trades.map(t => `
            <tr>
                <td>${new Date(t.timestamp).toLocaleString()}</td>
                <td>${t.agent_id}</td>
                <td><small>${t.market_id.substring(0, 20)}...</small></td>
                <td><span class="badge ${t.side === 'BUY' ? 'bg-success' : 'bg-danger'}">${t.side}</span></td>
                <td>${t.shares.toFixed(4)}</td>
                <td>$${t.price.toFixed(4)}</td>
                <td>$${t.filled_price.toFixed(4)}</td>
                <td>${t.signal_score ? t.signal_score.toFixed(1) : '-'}</td>
                <td><span class="badge ${t.success ? 'bg-success' : 'bg-danger'}">${t.success ? 'Success' : 'Failed'}</span></td>
            </tr>
        `).join('') : '<tr><td colspan="9" class="text-center">No trades found</td></tr>';
        
        document.getElementById('trades-table').innerHTML = html;
    } catch (error) {
        console.error('Error loading trades:', error);
    }
}

document.getElementById('filter-form').addEventListener('submit', (e) => {
    e.preventDefault();
    loadTrades();
});

loadTrades();
</script>
{% endblock %}
