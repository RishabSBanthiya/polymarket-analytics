<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Polymarket Analytics{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --tv-bg-primary: #131722;
            --tv-bg-secondary: #1e222d;
            --tv-border: #2a2e39;
            --tv-text-primary: #d1d4dc;
            --tv-text-secondary: #787b86;
            --tv-accent: #2962ff;
            --tv-green: #26a69a;
            --tv-red: #ef5350;
        }
        
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background-color: var(--tv-bg-primary);
            color: var(--tv-text-primary);
            min-height: 100vh;
        }
        
        .navbar {
            background: linear-gradient(180deg, #1e222d 0%, #131722 100%);
            border-bottom: 1px solid var(--tv-border);
            padding: 12px 0;
        }
        
        .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--tv-text-primary) !important;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .navbar-brand i {
            color: var(--tv-accent);
        }
        
        .nav-link {
            color: var(--tv-text-secondary) !important;
            font-weight: 500;
            padding: 8px 16px !important;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        
        .nav-link:hover {
            color: var(--tv-text-primary) !important;
            background: var(--tv-bg-secondary);
        }
        
        .nav-link.active {
            color: var(--tv-accent) !important;
            background: rgba(41, 98, 255, 0.1);
        }
        
        .card {
            background: var(--tv-bg-secondary);
            border: 1px solid var(--tv-border);
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        .card-header {
            background: var(--tv-bg-primary);
            border-bottom: 1px solid var(--tv-border);
            color: var(--tv-text-primary);
            font-weight: 600;
        }
        
        .stat-card {
            background: var(--tv-bg-secondary);
            border: 1px solid var(--tv-border);
            border-radius: 8px;
            border-left: 4px solid var(--tv-accent);
        }
        
        .stat-card.success {
            border-left-color: var(--tv-green);
        }
        
        .stat-card.danger {
            border-left-color: var(--tv-red);
        }
        
        .stat-card.warning {
            border-left-color: #ffb74d;
        }
        
        .table {
            color: var(--tv-text-primary);
        }
        
        .table thead th {
            color: var(--tv-text-secondary);
            border-bottom-color: var(--tv-border);
            font-weight: 500;
        }
        
        .table tbody td {
            border-bottom-color: var(--tv-border);
        }
        
        .badge {
            font-weight: 500;
        }
        
        .bg-success {
            background-color: var(--tv-green) !important;
        }
        
        .bg-danger {
            background-color: var(--tv-red) !important;
        }
        
        .text-success {
            color: var(--tv-green) !important;
        }
        
        .text-danger {
            color: var(--tv-red) !important;
        }
        
        h1, h2, h3, h4, h5 {
            color: var(--tv-text-primary);
        }
        
        .text-muted {
            color: var(--tv-text-secondary) !important;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--tv-bg-primary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--tv-border);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #3f4451;
        }
        
        /* Alert styling */
        .alert {
            border-radius: 8px;
        }
        
        .positive {
            color: var(--tv-green) !important;
        }
        
        .negative {
            color: var(--tv-red) !important;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-graph-up-arrow"></i> Polymarket Analytics
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/trades">Trades</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/alerts">Alerts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/risk">⚠️ Risk</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4 px-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
